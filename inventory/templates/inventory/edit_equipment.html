<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Edit Equipment</h1>
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="btn btn-danger btn-sm">Logout</button>
        </form>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show d-flex align-items-center" role="alert">
                <strong>{{ message }}</strong>
                <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">Editing: {{ item.SAGE_num }}</h5>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Type</label>
                    {{ form.type }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Serial Number</label>
                    {{ form.serial_number }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Location</label>
                    {{ form.location }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Purchase Date</label>
                    {{ form.purchase_date }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Last Service</label>
                    {{ form.last_service }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Notes</label>
                    {{ form.notes }}
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="{% url 'equipment_detail' item.SAGE_num %}" 
                       class="btn btn-secondary">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
