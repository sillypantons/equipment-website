<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">Request Sent Successfully</h5>
        </div>
        <div class="card-body">
            <div class="alert alert-success">
                Your request for <strong>{{ item.SAGE_num }}</strong> has been submitted.
                And will be reviewed and updated shortly.
            </div>
            <a href="{% url 'equipment_detail' item.SAGE_num %}" class="btn btn-primary">View Request History</a>
            <a href="/" class="btn btn-secondary">← Back to Inventory</a>
        </div>
    </div>
</div>
